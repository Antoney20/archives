name: Archives CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/archives
  DOCKER_TAG: ${{ github.sha }}

jobs:

  build_push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag $IMAGE_NAME:latest \
            --tag $IMAGE_NAME:$DOCKER_TAG \
            .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$DOCKER_TAG

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build_push
    services:
      sqlite:
        image: nouchka/sqlite3
        ports:
          - 3306:3306
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-root

      - name: Run Django tests
        run: |
          python manage.py migrate
          python manage.py test

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/archives:latest
            docker stop archives_service || true
            docker rm archives_service || true
            docker run -d \
              --name archives_service \
              -p 8001:8000 \
              -v /home/ubuntu/archives/media:/app/media \
              -v /home/ubuntu/archives/db.sqlite3:/app/db.sqlite3 \
              ghcr.io/${{ github.repository_owner }}/archives:latest